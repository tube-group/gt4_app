# s7ioserver 配置文件
# 格式: INI风格，支持多PLC

# ---- 全局设置 ----
[general]
gplat_server = 127.0.0.1
gplat_port = 8777
board_name = BOARD
reconnect_interval = 3000

# 守护进程配置
#   daemon   - 是否以守护进程运行: 0=前台, 1=后台（默认0，可被命令行-d覆盖）
#   pid_file - PID文件路径（默认 /var/run/s7ioserver.pid）
daemon = 0
#   pid_file = /var/run/s7ioserver.pid
pid_file = ./s7ioserver.pid

# 日志配置
#   log_file         - 日志文件路径（默认 s7ioserver.log）
#   log_level        - 日志等级: 0=ERROR, 1=WARN, 2=INFO, 3=DEBUG（默认2）
#   log_rotate_count - 保留备份文件数量（默认3）
#   log_rotate_size  - 单个日志文件最大MB（默认5）
log_file = s7ioserver.log
log_level = 3
log_rotate_count = 3
log_rotate_size = 1

# ---- PLC定义 ----
# 每个PLC一个section，section名任意（不能重复）
# PLC参数:
#   ip            - PLC的IP地址
#   rack          - 机架号（通常为0）
#   slot          - 槽号（S7-300/400通常为2，S7-1200/1500通常为1）
#   poll_interval - 轮询间隔（毫秒）

# ---- Tag定义 ----
# 格式: 名称 = 区域, DB号, 偏移量, 数据类型 [, 最大长度]
#
# 区域:
#   DB  - 数据块 (Data Block)
#   I   - 输入 (Inputs, 也可写EB)
#   Q   - 输出 (Outputs, 也可写AB)
#   M   - 中间寄存器 (Merkers, 也可写MK)
#
# DB号:
#   DB区域时为DB编号（如1表示DB1）
#   I/Q/M区域时填0
#
# 偏移量:
#   字节偏移.位偏移 (位偏移仅BOOL类型使用，0-7)
#   例: 0 表示字节偏移0
#       0.3 表示字节0的第3位
#
# 数据类型:
#   BOOL   - 布尔 (1位, Board中存为1字节)
#   INT    - 有符号16位整数
#   WORD   - 无符号16位整数
#   DINT   - 有符号32位整数
#   DWORD  - 无符号32位整数
#   REAL   - 32位浮点数
#   STRING - S7字符串 (需指定最大长度，默认254)
#
# 注意: tag名称在所有PLC之间必须全局唯一
#       Board中的tag须事先通过createtag/CreateItem创建好

[S7_GT4_SGAO]
