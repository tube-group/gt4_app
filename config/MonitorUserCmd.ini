# ---- 全局设置 ----
[general]
gplat_server = 127.0.0.1
gplat_port = 8777

# 守护进程配置
# daemon   - 是否以守护进程运行: 0=前台, 1=后台（默认0，可被命令行-d覆盖）
# pid_file - PID文件路径（默认 /var/run/tubetrack.pid）
daemon = 0
pid_file = /tmp/monitorusercmd.pid

# 日志配置
log_console = true           # 是否启用控制台输出
level = info                  # 文件输出的最低日志级别
# 日志格式模式：[年-月-日 时:分:秒.毫秒] [日志级别] [源文件:行号] [线程ID] 实际日志消息
pattern = "[%Y-%m-%d %H:%M:%S.%e] [%l] [%s:%#] [%t] %v"
filename = log/monitorusercmd.log       # 日志文件路径
immediate_flush = true        # 是否立即刷新到磁盘
# 按大小滚动配置（单位: kb）
max_size = 10
# 最大文件数
max_files = 3

# Redis连接配置
redis_host = 140.32.1.192
redis_port = 6379
redis_password = ggl2e=mc2
target_channel = operation_cmd
